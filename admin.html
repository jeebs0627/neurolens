<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>관리자 — NeuroLens | AX오픈랩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1B3F; --ink2:#2A3651;
  --blue:#1E5AF0; --blue-2:#4A7DFF; --blue-soft:#EEF3FF; --blue-line:#C9D8FF;
  --green:#0FA47A; --green-soft:#EAF7F2;
  --amber:#E8890C; --violet:#6C4CE0; --violet-soft:#F1EDFD;
  --rose:#E0446A;
  --gray:#5B6478; --gray2:#8A93A8; --line:#E4E9F4;
  --font-kr:'Noto Sans KR',-apple-system,sans-serif;
  --font-num:'Sora','Noto Sans KR',sans-serif;
  --shadow-sm:0 2px 10px rgba(11,27,63,.05);
  --grad-blue:linear-gradient(135deg,#1E5AF0,#4A7DFF);
  --grad-hero:linear-gradient(135deg,#1E5AF0 0%,#6C4CE0 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-kr);color:var(--ink);background:#F4F7FD;line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}

nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
nav .in{max-width:1120px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px}
nav .logo{font-family:var(--font-num);font-weight:800;font-size:16px;display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
nav .logo .mark{width:28px;height:28px;border-radius:9px;background:var(--grad-hero);display:grid;place-items:center}
nav .logo .mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
nav .logo em{font-style:normal;color:var(--blue)}
nav .admin-flag{font-family:var(--font-num);font-size:10px;font-weight:800;letter-spacing:.1em;color:#fff;background:linear-gradient(135deg,#E8890C,#F2A93B);border-radius:10px;padding:4px 11px}
nav .right{margin-left:auto;display:flex;gap:8px;align-items:center}
nav .who{font-size:12px;color:var(--gray)}
.btn{font-family:var(--font-kr);font-size:12.5px;font-weight:700;border-radius:11px;padding:8px 16px;cursor:pointer;transition:all .15s;border:1px solid var(--line);background:#fff;color:var(--gray);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{color:var(--blue);border-color:var(--blue-line);background:var(--blue-soft)}
.btn.primary{color:#fff;background:var(--grad-hero);border:none;box-shadow:0 6px 16px rgba(60,80,230,.28)}
.btn.primary:hover{transform:translateY(-1px);color:#fff}

main{max-width:1120px;margin:0 auto;padding:36px 24px 70px}
h1.pgtitle{font-size:24px;font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
.pgsub{font-size:13px;color:var(--gray);margin-bottom:28px}

/* 게이트 카드 (로그인/권한없음/미설정) */
.gate{max-width:420px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:22px;padding:36px 32px;box-shadow:var(--shadow-sm)}
.gate h2{font-size:19px;font-weight:900;margin-bottom:8px}
.gate p{font-size:13px;color:var(--gray);line-height:1.75;margin-bottom:20px}
.gate .fld{margin-bottom:13px}
.gate .fld label{display:block;font-size:12.5px;font-weight:800;margin-bottom:6px}
.gate .fld input{width:100%;font-family:inherit;font-size:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px}
.gate .fld input:focus{outline:2px solid var(--blue-line)}
.gate .submit{width:100%;font-family:var(--font-kr);font-size:15px;font-weight:800;color:#fff;background:var(--grad-hero);border:none;border-radius:13px;padding:14px 0;cursor:pointer;box-shadow:0 10px 24px rgba(60,80,230,.28)}
.gate .submit:disabled{opacity:.55}
.gate .msg{font-size:12.5px;min-height:1.6em;margin:6px 0 12px;color:var(--gray)}
.gate .msg.err{color:#D6455D;font-weight:600}
.gate code{background:#F1F4FB;border-radius:6px;padding:2px 7px;font-size:12px}

/* 통계 타일 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sc,var(--grad-blue))}
.stat small{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--gray2);margin-bottom:6px}
.stat b{font-family:var(--font-num);font-size:28px;font-weight:800;line-height:1.1}
.stat .sub{font-size:11px;color:var(--gray2);margin-top:4px}

/* 카드 & 테이블 */
.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px 26px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.panel h3{font-size:12px;font-family:var(--font-num);font-weight:700;letter-spacing:.12em;color:var(--blue);margin-bottom:16px;text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.panel h3::before{content:"";width:16px;height:2px;background:var(--grad-blue);border-radius:2px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar input{flex:1;min-width:180px;font-family:inherit;font-size:13.5px;padding:10px 14px;border:1px solid var(--line);border-radius:12px}
.toolbar input:focus{outline:2px solid var(--blue-line)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}
thead th{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--gray2);text-align:left;padding:8px 10px;border-bottom:2px solid var(--line);white-space:nowrap}
tbody td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr{transition:background .12s;cursor:pointer}
tbody tr:hover{background:#F8FAFE}
tbody tr.sel{background:var(--blue-soft)}
.nm-cell{display:flex;gap:9px;align-items:center;font-weight:700}
.avt{width:30px;height:30px;border-radius:50%;background:var(--grad-hero);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:900;flex:none}
.email{color:var(--gray);font-size:12px}
.role-chip{font-family:var(--font-num);font-size:9.5px;font-weight:800;letter-spacing:.06em;border-radius:9px;padding:3px 9px;white-space:nowrap}
.role-chip.admin{color:#fff;background:linear-gradient(135deg,#E8890C,#F2A93B)}
.role-chip.user{color:var(--gray);background:#F1F4FB;border:1px solid var(--line)}
.cnt-chip{font-family:var(--font-num);font-weight:800;color:var(--blue);background:var(--blue-soft);border-radius:9px;padding:3px 11px;font-size:12px}
.cnt-chip.zero{color:var(--gray2);background:#F4F6FB}
.num{font-family:var(--font-num)}
.muted{color:var(--gray2)}
.view-btn{font-family:var(--font-kr);font-size:11.5px;font-weight:800;color:var(--blue);background:var(--blue-soft);border:1px solid var(--blue-line);border-radius:10px;padding:6px 12px;cursor:pointer;white-space:nowrap}
.view-btn:hover{background:#E2EBFF}
.empty{font-size:13px;color:var(--gray2);text-align:center;padding:30px 10px}

/* 회원 상세 (검사 내역) */
#memberDetail .mrow{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:13px;padding:11px 14px;margin-bottom:8px}
#memberDetail .mrow:hover{border-color:var(--blue-line)}
#memberDetail .no{font-family:var(--font-num);font-size:10.5px;font-weight:800;color:var(--violet);background:var(--violet-soft);border-radius:10px;padding:4px 10px;white-space:nowrap;flex:none}
#memberDetail .inf{flex:1;min-width:0}
#memberDetail .inf b{font-family:var(--font-num);font-size:13.5px}
#memberDetail .inf small{display:block;font-size:11px;color:var(--gray2)}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid var(--blue-line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{border-top:1px solid var(--line);background:#fff;padding:24px 0;text-align:center;font-size:12px;color:var(--gray)}
</style>
</head>
<body>

<nav>
  <div class="in">
    <a class="logo" href="index.html">
      <span class="mark"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.6"/></svg></span>
      AX<em>오픈랩</em>
    </a>
    <span class="admin-flag">ADMIN</span>
    <div class="right">
      <span class="who" id="whoami"></span>
      <a class="btn" href="index.html">🏠 메인</a>
      <button class="btn" id="logoutBtn" style="display:none">로그아웃</button>
    </div>
  </div>
</nav>

<main>
  <!-- 게이트: 미설정 / 로그인 / 권한 없음 -->
  <div class="gate" id="gate">
    <h2><span class="spinner"></span>확인 중…</h2>
    <p>로그인 상태를 확인하고 있습니다.</p>
  </div>

  <!-- 대시보드 -->
  <div id="dash" style="display:none">
    <h1 class="pgtitle">🛠 관리자 대시보드</h1>
    <div class="pgsub">회원가입 현황과 회원별 검사 현황을 한눈에 확인합니다. <span class="muted" id="loadedAt"></span></div>

    <div class="stats">
      <div class="stat" style="--sc:var(--grad-blue)"><small>총 회원</small><b id="stUsers">0</b><div class="sub">가입 완료 계정</div></div>
      <div class="stat" style="--sc:linear-gradient(135deg,#6C4CE0,#8E75EE)"><small>총 검사</small><b id="stTests">0</b><div class="sub">저장된 검사 결과</div></div>
      <div class="stat" style="--sc:linear-gradient(135deg,#0FA47A,#3EC49E)"><small>오늘 가입</small><b id="stTodayUsers">0</b><div class="sub">오늘 0시 이후 가입</div></div>
      <div class="stat" style="--sc:linear-gradient(135deg,#E8890C,#F2A93B)"><small>오늘 검사</small><b id="stTodayTests">0</b><div class="sub">오늘 0시 기준</div></div>
    </div>

    <div class="panel">
      <h3>Members · 회원가입 리스트 현황</h3>
      <div class="toolbar">
        <input type="text" id="searchBox" placeholder="이름 또는 이메일 검색…">
        <button class="btn" id="refreshBtn">⟳ 새로고침</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>회원</th><th>이메일</th><th>권한</th><th>가입일</th><th>검사 수</th><th>최근 검사</th><th></th>
          </tr></thead>
          <tbody id="memberRows"></tbody>
        </table>
      </div>
      <div class="empty" id="memberEmpty" style="display:none">표시할 회원이 없습니다.</div>
    </div>

    <div class="panel" id="detailPanel" style="display:none">
      <h3>Tests · <span id="detailName" style="letter-spacing:0"></span> 회원의 검사 내역</h3>
      <div id="memberDetail"></div>
    </div>
  </div>
</main>

<footer>AX오픈랩 · NeuroLens Admin — 관리자 전용 페이지 (role = 'admin')</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function fmtDate(iso){const d=new Date(iso);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDT(iso){const d=new Date(iso);return fmtDate(iso)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

const gate=document.getElementById('gate');
const dash=document.getElementById('dash');
let PROFILES=[], RESULTS=[], byUser={}, selectedId=null;

/* ---------- 게이트 상태 ---------- */
function gateHTML(html){ gate.style.display='block'; dash.style.display='none'; gate.innerHTML=html; }

function showLogin(msg){
  gateHTML(
    '<h2>🔐 관리자 로그인</h2>'
    +'<p>관리자 계정(role=admin)으로 로그인해 주세요.</p>'
    +'<form id="loginForm">'
    +'<div class="fld"><label>이메일</label><input type="email" name="email" required placeholder="admin@example.com"></div>'
    +'<div class="fld"><label>비밀번호</label><input type="password" name="password" required placeholder="비밀번호"></div>'
    +'<div class="msg'+(msg?' err':'')+'" id="loginMsg">'+esc(msg||'')+'</div>'
    +'<button type="submit" class="submit">로그인</button>'
    +'</form>');
  document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f=e.target, m=document.getElementById('loginMsg');
    m.className='msg'; m.textContent='로그인 중…';
    try{
      await NLAuth.signIn(f.email.value.trim(), f.password.value);
      boot();
    }catch(err){
      m.className='msg err';
      m.textContent=/Invalid login credentials/i.test(String(err&&err.message))
        ?'이메일 또는 비밀번호가 올바르지 않습니다.':'로그인 실패: '+((err&&err.message)||err);
    }
  });
}

function showNoAccess(email){
  gateHTML(
    '<h2>⛔ 관리자 권한이 없습니다</h2>'
    +'<p><b>'+esc(email)+'</b> 계정은 일반 회원입니다.<br>'
    +'Supabase SQL Editor에서 아래를 실행하면 관리자가 됩니다:</p>'
    +'<p><code>update public.profiles set role=\'admin\' where email=\''+esc(email)+'\';</code></p>'
    +'<button class="submit" id="switchBtn">다른 계정으로 로그인</button>');
  document.getElementById('switchBtn').addEventListener('click', async ()=>{ await NLAuth.signOut(); showLogin(); });
}

function showNotConfigured(){
  gateHTML(
    '<h2>⚙ Supabase 설정 필요</h2>'
    +'<p>관리자 페이지를 사용하려면 <code>supabase-config.js</code>에 프로젝트 URL과 anon key를 넣고, '
    +'<code>SUPABASE_SETUP.md</code>의 SQL을 실행해야 합니다.</p>'
    +'<a class="submit" href="index.html" style="display:block;text-align:center;text-decoration:none">메인으로 돌아가기</a>');
}

/* ---------- 부트: 로그인 + 관리자 확인 후 데이터 로드 ---------- */
async function boot(){
  if(!window.NLAuth || !NLAuth.enabled){ showNotConfigured(); return; }
  const u=await NLAuth.getUser();
  if(!u){ document.getElementById('whoami').textContent=''; document.getElementById('logoutBtn').style.display='none'; showLogin(); return; }
  document.getElementById('whoami').textContent=u.email;
  document.getElementById('logoutBtn').style.display='';
  const admin=await NLAuth.isAdmin();
  if(!admin){ showNoAccess(u.email); return; }
  gateHTML('<h2><span class="spinner"></span>데이터 로드 중…</h2><p>회원/검사 데이터를 불러오고 있습니다.</p>');
  try{
    const [profiles,results]=await Promise.all([NLAuth.adminListProfiles(), NLAuth.adminListResults()]);
    PROFILES=profiles; RESULTS=results;
    byUser={};
    RESULTS.forEach(r=>{ (byUser[r.user_id]=byUser[r.user_id]||[]).push(r); });
    renderDash();
  }catch(err){
    gateHTML('<h2>⚠ 데이터 로드 실패</h2><p>'+esc((err&&err.message)||err)
      +'</p><p>SUPABASE_SETUP.md의 SQL(테이블·RLS 정책)이 실행되었는지 확인해 주세요.</p>'
      +'<button class="submit" onclick="boot()">다시 시도</button>');
  }
}

/* ---------- 대시보드 렌더링 ---------- */
function renderDash(){
  gate.style.display='none'; dash.style.display='block';
  const today=new Date(); today.setHours(0,0,0,0);
  document.getElementById('stUsers').textContent=PROFILES.length;
  document.getElementById('stTests').textContent=RESULTS.length;
  document.getElementById('stTodayUsers').textContent=PROFILES.filter(p=>new Date(p.created_at)>=today).length;
  document.getElementById('stTodayTests').textContent=RESULTS.filter(r=>new Date(r.created_at)>=today).length;
  document.getElementById('loadedAt').textContent='· 기준 '+fmtDT(new Date().toISOString());
  renderMembers();
  if(selectedId) renderDetail(selectedId);
}

function renderMembers(){
  const q=(document.getElementById('searchBox').value||'').trim().toLowerCase();
  const rows=PROFILES.filter(p=>
    !q || (p.name||'').toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q));
  const tbody=document.getElementById('memberRows');
  document.getElementById('memberEmpty').style.display=rows.length?'none':'block';
  tbody.innerHTML=rows.map((p,i)=>{
    const tests=byUser[p.id]||[];
    const last=tests[0]; // adminListResults가 최신순
    const nm=p.name||p.email.split('@')[0];
    return '<tr data-id="'+esc(p.id)+'" class="'+(p.id===selectedId?'sel':'')+'">'
      +'<td class="num muted">'+(i+1)+'</td>'
      +'<td><span class="nm-cell"><span class="avt">'+esc(nm.slice(0,1).toUpperCase())+'</span>'+esc(nm)+'</span></td>'
      +'<td class="email">'+esc(p.email||'')+'</td>'
      +'<td><span class="role-chip '+(p.role==='admin'?'admin':'user')+'">'+(p.role==='admin'?'ADMIN':'USER')+'</span></td>'
      +'<td class="num">'+fmtDate(p.created_at)+'</td>'
      +'<td><span class="cnt-chip'+(tests.length?'':' zero')+'">'+tests.length+'회</span></td>'
      +'<td class="num">'+(last?fmtDate(last.created_at):'<span class="muted">—</span>')+'</td>'
      +'<td><button class="view-btn" data-id="'+esc(p.id)+'">검사 내역 →</button></td>'
      +'</tr>';
  }).join('');
  tbody.querySelectorAll('tr').forEach(tr=>tr.addEventListener('click',()=>selectMember(tr.getAttribute('data-id'))));
}

function selectMember(id){
  selectedId=id;
  document.querySelectorAll('#memberRows tr').forEach(tr=>tr.classList.toggle('sel',tr.getAttribute('data-id')===id));
  renderDetail(id);
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderDetail(id){
  const p=PROFILES.find(x=>x.id===id);
  if(!p) return;
  const panel=document.getElementById('detailPanel');
  panel.style.display='block';
  document.getElementById('detailName').textContent=(p.name||p.email)+' ('+(p.email||'')+')';
  const tests=byUser[id]||[];
  const box=document.getElementById('memberDetail');
  if(!tests.length){
    box.innerHTML='<div class="empty">이 회원의 저장된 검사 결과가 아직 없습니다.</div>';
    return;
  }
  box.innerHTML=tests.map((t,i)=>
    '<div class="mrow">'
    +'<span class="no">'+(tests.length-i)+'회차</span>'
    +'<div class="inf"><b>'+fmtDT(t.created_at)+'</b>'
    +'<small>'+(t.mbti?'MBTI '+esc(t.mbti):'')+(t.holland?' · 흥미 '+esc(t.holland):'')+(t.name?' · 검사자명 '+esc(t.name):'')+'</small></div>'
    +'<button class="view-btn" data-rid="'+esc(t.id)+'">결과 리포트 보기 ↗</button>'
    +'</div>').join('');
  box.querySelectorAll('.view-btn').forEach(b=>
    b.addEventListener('click',()=>window.open('report.html?id='+b.dataset.rid,'_blank')));
}

/* ---------- 이벤트 ---------- */
document.getElementById('searchBox').addEventListener('input', renderMembers);
document.getElementById('refreshBtn').addEventListener('click', boot);
document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await NLAuth.signOut(); selectedId=null; boot();
});

boot();
</script>
</body>
</html>
